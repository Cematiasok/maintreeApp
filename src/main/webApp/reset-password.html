<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Maintree</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+Antique&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .error-text {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container-form">
    <div class="information">
        <div class="Imfo-childs">
            <h2>Maintree</h2>
            <p>Gestion inteligente de mantenimiento indistrial.</p>
        </div>
    </div>


    <div class="form-information">
        <div class="logo-container">
            <img src="css/img/logo_Maintree.png" alt="Logo Maintree">
        </div>
        <div id="errorMessage" style="color: red;" class="error"></div>

        <div class="form-login">
            <p id="error-message" class="error-text"></p>

            <h2>Restablecer Contraseña</h2>
            <p>Ingresa tu nueva contraseña.</p>

            <form id="reset-form" action="reset-password" method="POST">
                <input type="hidden" id="token-input" name="token" value="">

                <div class="mb-3">
                    <label for="newPassword" class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword" required>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-login">Cambiar Contraseña</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const error = params.get('error');

            if (token) {
                document.getElementById('token-input').value = token;
            } else {
                // Si no hay token, no se puede proceder
                document.querySelector('.form-login').innerHTML = '<h2>Enlace inválido</h2><p>El enlace para restablecer la contraseña no es válido o ha expirado. Por favor, solicita uno nuevo.</p>';
            }

            if (error) {
                document.getElementById('error-message').textContent = decodeURIComponent(error.replace(/\+/g, ' '));
            }

            // Validación de contraseñas coincidentes
            document.getElementById('reset-form').addEventListener('submit', function(e) {
                const newPass = document.getElementById('newPassword').value;
                const confirmPass = document.getElementById('confirmPassword').value;
                
                if (newPass !== confirmPass) {
                    e.preventDefault();
                    const errorMsg = document.getElementById('error-message');
                    errorMsg.textContent = 'Las contraseñas no coinciden';
                    errorMsg.style.display = 'block';
                    return false;
                }
            });
        });
    </script>
    <script src="js/script.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
