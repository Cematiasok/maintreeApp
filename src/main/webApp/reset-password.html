<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <!-- Asumo que tienes un CSS similar a tus otras páginas -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .error-text {
            color: #dc3545;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container-form">
    <div class="information">
        <div class="Imfo-childs">
            <h2>Maintree</h2>
            <p>Gestion inteligente de mantenimiento indistrial.</p>
        </div>
    </div>


    <div form class="form-imformation">
        <div class="logo-container">
            <img src="css/img/logo_Maintree.png" alt="Logo Maintree">
        </div>
        <div id="errorMessage" style="color: red;" class="error"></div>


    <div class="container">
        <div class="form-login">
            <p id="error-message" class="error-text"></p>

            <h2>Restablecer Contraseña</h2>
            <p>Ingresa tu nueva contraseña.</p>

            <form id="reset-form" action="reset-password" method="POST">
                
                <input type="hidden" id="token-input" name="token" value="">

                <div class="input-group">
                    <label for="newPassword">Nueva Contraseña:</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmar Contraseña:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn-login">Cambiar Contraseña</button>
            </form>
            


        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const error = params.get('error');

            if (token) {
                document.getElementById('token-input').value = token;
            } else {
                // Si no hay token, no se puede proceder
                document.querySelector('.form-container').innerHTML = '<h2>Enlace inválido</h2><p>El enlace para restablecer la contraseña no es válido o ha expirado. Por favor, solicita uno nuevo.</p>';
            }

            if (error) {
                document.getElementById('error-message').textContent = decodeURIComponent(error.replace(/\+/g, ' '));
            }
        });
    </script>
</body>
</html>
