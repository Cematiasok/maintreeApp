<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/styles.css">
  <title>Recuperar contraseña</title>
  <style>
      .info-message { color: green; text-align: center; margin-bottom: 15px; }
      .error-message { color: red; text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container-form">
    <!-- Panel Izquierdo -->
    <div class="information">
      <div class="info-childs">
        <p class="marca">MAINTREE</p>
      </div>
    </div>

    <!-- Panel Derecho -->
    <div class="form-imformation">
      <div class="logo-container">
          <img src="css/img/logo_Maintree.png" alt="Logo Maintree">
      </div>

      <!-- El action apunta al servlet y el método es POST -->
      <form id="recoverForm" class="form-login" action="forgot-password" method="POST">
        
        <div id="message-container"></div>

        <label for="recoverEmail">Usuario o Email</label>
        <!-- El name debe ser "email" para que el servlet lo reciba -->
        <input type="text" id="recoverEmail" name="email" placeholder="usuario123" required>

        <button type="submit" class="btn-login">ENVIAR ENLACE</button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const status = params.get('status');
      const messageContainer = document.getElementById('message-container');

      if (status === 'sent') {
        messageContainer.innerHTML = '<p class="info-message">Si el correo está registrado, se ha enviado un enlace de recuperación.</p>';
      } else if (status === 'error') {
        messageContainer.innerHTML = '<p class="error-message">Hubo un error al procesar la solicitud. Inténtalo de nuevo más tarde.</p>';
      }
    });
  </script>
</body>
</html>
