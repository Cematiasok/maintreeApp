<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/styles.css">
  <title>Recuperar contraseña</title>
  <style>
      .info-message { color: green; text-align: center; margin-bottom: 15px; }
      .error-message { color: red; text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container-form">
    <!-- Panel Izquierdo -->
    <div class="information">
      <div class="info-childs">
        <p class="marca">MAINTREE</p>
      </div>
    </div>

    <!-- Panel Derecho -->
    <div class="form-imformation">
      <div class="logo-container">
          <img src="css/img/logo_Maintree.png" alt="Logo Maintree">
      </div>

      <form id="recoverForm" class="form-login">
        
        <div id="message-container"></div>

        <label for="recoverEmail">Usuario o Email</label>
        <input type="email" id="recoverEmail" name="email" placeholder="usuario123" required>

        <button type="submit" class="btn-login">ENVIAR ENLACE</button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
