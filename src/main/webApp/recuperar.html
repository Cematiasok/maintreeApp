<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/styles.css">
  <title>Recuperar contraseña</title>
</head>
<body>
  <div class="container-form">
    <!-- Panel Izquierdo -->
    <div class="information">
      <div class="info-childs">
        <p class="marca">MAINTREE</p>
      </div>
    </div>

    <!-- Panel Derecho -->
    <div class="form-imformation">
      <div class="logo-container">
          <img src="css/img/logo_Maintree.png" alt="Logo Maintree">
      </div>

      <form id="recoverForm" class="form-login">
        <p id="mensajeRecuperacion"
           style="color:green; text-align:center; margin-bottom:15px; display:none;">
          Se ha enviado un enlace de recuperación a su correo
        </p>

        <label for="recoverEmail">Usuario o Email</label>
        <input type="text" id="recoverEmail" name="recoverEmail" placeholder="usuario123">

        <button type="submit" class="btn-login">ENVIAR ENLACE</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("recoverForm").addEventListener("submit", function(e){
      e.preventDefault();
      const msg = document.getElementById("mensajeRecuperacion");
      msg.style.display = "block";
    });
  </script>
</body>
</html>
